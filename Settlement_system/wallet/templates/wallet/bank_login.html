{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الموظفين - البنك الوسيط</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&family=Tajawal:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        /* Force Centering and Modern Corporate Design */
        .login-container-corporate {
            height: 100vh !important;
            width: 100% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background-color: #f8f9fa !important;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 180, 216, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 180, 216, 0.05) 0%, transparent 40%) !important;
            position: fixed !important;
            top: 0;
            left: 0;
            z-index: 9999;
            overflow: hidden !important;
        }

        .corporate-glass-card {
            background: #14213d !important;
            /* Deep Corporate Blue */
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(0, 180, 216, 0.3) !important;
            border-radius: 16px !important;
            padding: 3.5rem !important;
            width: 90% !important;
            max-width: 480px !important;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2) !important;
            position: relative !important;
            z-index: 10000 !important;
        }

        .cyan-accent-line {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #00b4d8 0%, #90e0ef 100%);
            margin: 1.5rem auto;
            border-radius: 2px;
        }

        .corporate-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            padding: 1.1rem !important;
            border-radius: 8px !important;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .corporate-input:focus {
            border-color: #00b4d8 !important;
            background: rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.15) !important;
            outline: none;
        }

        .btn-corporate {
            background: linear-gradient(135deg, #00b4d8 0%, #0077b6 100%);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 1.1rem;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .btn-corporate:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.5);
            filter: brightness(1.1);
        }

        .btn-corporate:active {
            transform: translateY(-1px);
        }

        .link-cyan {
            color: #90e0ef;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .link-cyan:hover {
            color: #fff;
            text-shadow: 0 0 8px rgba(0, 180, 216, 0.6);
        }

        .industrial-pattern {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            opacity: 0.03 !important;
            pointer-events: none !important;
            background-image:
                linear-gradient(rgba(0, 180, 216, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 216, 0.2) 1px, transparent 1px) !important;
            background-size: 40px 40px !important;
        }
    </style>
</head>

<body>

    <div class="login-container-corporate">
        <div class="industrial-pattern"></div>

        <div class="corporate-glass-card animate-fade-in text-center">
            <div class="mb-5">
                <div class="d-inline-block p-3 rounded-circle mb-3" style="background: rgba(0, 180, 216, 0.1);">
                    <i class="fas fa-building fa-3x"
                        style="color: #00b4d8; filter: drop-shadow(0 0 8px rgba(0, 180, 216, 0.4));"></i>
                </div>
                <h2 style="font-family: 'Outfit', sans-serif; color: #ffffff; letter-spacing: 2px; font-weight: 600;">
                    البنك الوسيط
                </h2>
                <div class="cyan-accent-line"></div>
                <p style="color: rgba(255,255,255,0.5); font-size: 0.85rem; letter-spacing: 1px;">
                    بوابة إدارة المحافظ والعمليات الرقمية
                </p>
            </div>

            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                <div class="alert bg-transparent border-0 text-center small text-white py-2" role="alert"
                    style="border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,180,216,0.05);">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    <label
                        style="color: rgba(255,255,255,0.7); display: block; margin-bottom: 0.6rem; font-size: 0.8rem; font-weight: 500;">اسم
                        المستخدم</label>
                    <div class="position-relative">
                        <i class="fas fa-user-circle position-absolute"
                            style="top: 50%; right: 15px; transform: translateY(-50%); color: rgba(255,255,255,0.3);"></i>
                        <input type="text" name="username" class="corporate-input w-100 pe-5" placeholder="Username"
                            required>
                    </div>
                </div>

                <div class="mb-5 text-start">
                    <label
                        style="color: rgba(255,255,255,0.7); display: block; margin-bottom: 0.6rem; font-size: 0.8rem; font-weight: 500;">كلمة
                        المرور</label>
                    <div class="position-relative">
                        <i class="fas fa-lock position-absolute"
                            style="top: 50%; right: 15px; transform: translateY(-50%); color: rgba(255,255,255,0.3);"></i>
                        <input type="password" name="password" class="corporate-input w-100 pe-5" placeholder="••••••••"
                            required>
                    </div>
                </div>

                <button type="submit" class="btn-corporate w-100 mb-4">
                    تسجيل الدخول <i class="fas fa-sign-in-alt ms-2"></i>
                </button>
            </form>

            <div class="text-center pt-4" style="border-top: 1px solid rgba(255,255,255,0.1);">
                <a href="{% url 'home' %}" class="link-cyan">
                    <i class="fas fa-door-open me-2"></i> الرجوع للبوابة الرئيسية
                </a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% include 'includes/tab_session_js.html' %}
</body>

</html>
