<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الطالب - بوابة القبول الموحد</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden animate-up">
                    <div class="card-header bg-success text-white text-center p-4">
                        <h4 class="mb-0 fw-bold"><i class="fas fa-user-graduate me-2"></i>تسجيل دخول الطالب</h4>
                    </div>
                    <div class="card-body p-5">
                        <form id="loginForm">
                            <input type="hidden" id="role" value="student">
                            <div class="mb-3">
                                <label for="email" class="form-label">البريد الإلكتروني</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i
                                            class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control" id="email" placeholder="name@example.com"
                                        required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">كلمة المرور</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i
                                            class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control" id="password" placeholder="********"
                                        required>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">تذكرني</label>
                                </div>
                                <a href="#" class="text-success text-decoration-none small">نسيت كلمة المرور؟</a>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 mb-3 fw-bold">تسجيل الدخول</button>
                            <div class="text-center">
                                <span class="text-muted">ليس لديك حساب؟</span>
                                <a href="signup.html" class="text-success fw-bold text-decoration-none">إنشاء حساب
                                    جديد</a>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="../index.html" class="text-muted text-decoration-none"><i
                            class="fas fa-arrow-right me-1"></i> العودة للرئيسية</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
</body>

</html>
