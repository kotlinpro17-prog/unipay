{% extends 'base.html' %}
{% load static %}

{% block title %}دخول الإدارة - بوابة القبول الموحد{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light" style="padding-top: 80px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden animate-up">
                    <div class="card-header bg-danger text-white text-center p-4">
                        <h4 class="mb-0 fw-bold"><i class="fas fa-user-shield me-2"></i>لوحة الإدارة العامة</h4>
                    </div>
                    <div class="card-body p-5">
                        <form method="post">
                            {% csrf_token %}
                            {% if form.errors %}
                            <div class="alert alert-danger">
                                اسم المستخدم أو كلمة المرور غير صحيحة.
                            </div>
                            {% endif %}
                            <div class="mb-3">
                                <label for="id_username" class="form-label">اسم المستخدم</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i
                                            class="fas fa-user text-muted"></i></span>
                                    <input type="text" name="username" class="form-control" id="id_username" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="id_password" class="form-label">كلمة المرور</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i
                                            class="fas fa-lock text-muted"></i></span>
                                    <input type="password" name="password" class="form-control" id="id_password"
                                        required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 py-2 mb-3 fw-bold">
                                <i class="fas fa-sign-in-alt me-2"></i>تسجيل الدخول
                            </button>
                        </form>
                    </div>
                </div>
                <div class="mt-4 text-center">
                    <a href="{% url 'home' %}" class="text-decoration-none text-muted">
                        <i class="fas fa-arrow-right me-1"></i> العودة للرئيسية
                    </a>
                    <span class="mx-2 text-muted">|</span>
                    <a href="{% url 'admin_signup' %}" class="text-decoration-none text-danger fw-bold">
                        <i class="fas fa-user-plus me-1"></i> إنشاء حساب جديد
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
