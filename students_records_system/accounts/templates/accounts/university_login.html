{% extends 'base.html' %}
{% load static %}

{% block title %}دخول الجامعة - بوابة القبول الموحد{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light" style="padding-top: 80px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden animate-up">
                    <div class="card-header bg-success text-white text-center p-4">
                        <h4 class="mb-0 fw-bold"><i class="fas fa-university me-2"></i>بوابة الجامعات</h4>
                    </div>
                    <div class="card-body p-5">
                        <form method="post">
                            {% csrf_token %}
                            {% if form.errors %}
                            <div class="alert alert-danger">
                                اسم المستخدم أو كلمة المرور غير صحيحة.
                            </div>
                            {% endif %}
                            <div class="mb-3">
                                <label for="id_username" class="form-label">اسم المستخدم</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i
                                            class="fas fa-user text-muted"></i></span>
                                    <input type="text" name="username" class="form-control" id="id_username" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="id_password" class="form-label">كلمة المرور</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i
                                            class="fas fa-lock text-muted"></i></span>
                                    <input type="password" name="password" class="form-control" id="id_password"
                                        required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 mb-3 fw-bold">تسجيل الدخول</button>

                        </form>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="{% url 'home' %}" class="text-muted text-decoration-none"><i
                            class="fas fa-arrow-right me-1"></i> العودة للرئيسية</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
